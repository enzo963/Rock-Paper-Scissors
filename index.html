<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="class-man">

        <div class="glass-box">
            <div class="avatar">
                <img src="images/Red.png" alt="You">
                <img class="vs-img" src="images/VS.png" alt="VS">
                <img src="images/purple.png" alt="Computer">
            </div>

            <div class="avatar-name">
                <h5 style="color: brown; margin-left: 24px;">You</h5>
                <h5 style="color: rgb(110, 52, 110);">Computer</h5>
            </div>

            <div class="contianer-fight-arean">
                <div class="fight-arena">
                    <div class="buttons-class">
                        <button onclick="
                        playGame('rock');
                        
                         " class="choice you-choice">
                            <img src="images/rock.png">
                        </button>

                        <button onclick="
                        playGame('paper');

                        " class="choice you-choice">
                            <img src="images/paper.png">
                        </button>

                        <button onclick="
                        playGame('scissors');

                        " class="choice you-choice">
                            <img src="images/Sciss.png">
                        </button>

                    </div>
                    <div class="container-score">
                        <div class="score-info">

                            <p class="score you-score">0</p>
                            <p class="score point">:</p>
                            <p class="score computer-score">0</p>

                        </div>
                    </div>
                    <div class="buttons-class">
                        <button class="choice">
                            <img src="images/rock.png">
                        </button>

                        <button class="choice">
                            <img src="images/paper.png">
                        </button>

                        <button class="choice">
                            <img src="images/Sciss.png">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
